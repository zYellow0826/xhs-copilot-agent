name: 功能建议
description: 提议一个新功能或改进
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        在提议前请先看一眼 [ROADMAP](../../docs/ROADMAP.md)，避免和现有规划重复。

  - type: textarea
    id: problem
    attributes:
      label: 你想解决的问题
      description: 是什么场景让你需要这个功能？
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 其他考虑过的方案

  - type: textarea
    id: extra
    attributes:
      label: 补充信息
